version: "3.9"

services:
  airflow-scheduler:
    image: apache/airflow:2.9.3-python3.11
    restart: always
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__FERNET_KEY=fernet_key
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
    command: scheduler

  airflow-api:
    image: apache/airflow:2.9.3-python3.11
    restart: always
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__FERNET_KEY=fernet_key
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
    ports:
      - "8080:8080"
    command: api-server

  mlflow:
    image: python:3.11-slim
    restart: always
    working_dir: /app
    volumes:
      - ./mlruns:/app/mlruns
    command: mlflow ui --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"

  fastapi:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
