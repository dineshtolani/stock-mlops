name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Checkout code
    - name: Checkout repository
      uses: actions/checkout@v3

    # Set up Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    # Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r docker/requirements.txt

    # Lint and static analysis
    - name: Run flake8 linting
      run: |
        pip install flake8 bandit safety
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        bandit -r src/
        safety check

    # Run unit tests
    - name: Run tests
      run: |
        pytest tests/

    # Build Docker image
    - name: Build Docker image
      run: |
        docker build -t stock-api -f docker/Dockerfile .

    # Trivy vulnerability scan (image + filesystem)
    - name: Scan Docker image with Trivy
      uses: aquasecurity/trivy-action@0.11.0
      with:
        image-ref: stock-api
        format: table
        exit-code: 1
        ignore-unfixed: true

    - name: Scan repository with Trivy
      uses: aquasecurity/trivy-action@0.12.0
      with:
        scan-type: fs
        format: table
        exit-code: 1
        ignore-unfixed: true

    # SonarQube analysis
    - name: SonarQube Scan
      uses: sonarsource/sonarcloud-github-action@v2
      with:
        args: >
          -Dsonar.projectKey=dineshtolani_stock-mlops
          -Dsonar.organization=dineshtolani
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
